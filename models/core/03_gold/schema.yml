version: 2

models:
  - name: dim_users
    description: "Dimension table containing cleaned and consolidated user information."
    columns:
      - name: user_id
        description: "Primary key for the user dimension."
        data_tests:
          - unique
          - not_null

  - name: dim_products
    description: "Dimension table containing detailed product information."
    columns:
      - name: product_id
        description: "Primary key for the product dimension."
        data_tests:
          - unique
          - not_null

  - name: dim_orders
    description: "Dimension table containing overall order header information."
    columns:
      - name: order_id
        description: "Primary key for the order dimension."
        data_tests:
          - unique
          - not_null

  - name: fact_order_items
    description: "Fact table containing transaction-level data for order items, enriched with cost and gross profit."
    columns:
      - name: order_item_id
        description: "Primary key for individual order items."
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key referencing the dim_orders dimension."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_orders')
              field: order_id
      - name: user_id
        description: "Foreign key referencing the dim_users dimension."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: product_id
        description: "Foreign key referencing the dim_products dimension."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
